services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finance}
      POSTGRES_DB: ${POSTGRES_DB:-finance}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finance} -d ${POSTGRES_DB:-finance}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      args:
        # Match `id -u` / `id -g` so bind-mounted source is readable (set in .env if needed).
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    restart: unless-stopped
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    env_file:
      - path: ./.env
        required: false
    environment:
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://${POSTGRES_USER:-finance}:${POSTGRES_PASSWORD:-finance}@postgres:5432/${POSTGRES_DB:-finance}"
      FASTAPI_HOST: "0.0.0.0"
    volumes:
      # Bind-mount source code from the git clone on the host.
      # After `git pull`, run `docker compose restart web` to apply changes
      # without rebuilding the image (only rebuild if pyproject.toml changes).
      - ./main.py:/app/main.py:ro
      - ./app:/app/app:ro
    depends_on:
      postgres:
        condition: service_healthy

  # Runs etl/etl_fx_rates.py and etl/etl_prices_portfolio.py on a fixed interval (~once/day; not wall-clock aligned).
  etl_fx_rates:
    build:
      context: .
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    environment:
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://${POSTGRES_USER:-finance}:${POSTGRES_PASSWORD:-finance}@postgres:5432/${POSTGRES_DB:-finance}"
      TZ: UTC
      ETL_FX_INTERVAL_SEC: ${ETL_FX_INTERVAL_SEC:-86400}
    volumes:
      - ./main.py:/app/main.py:ro
      - ./app:/app/app:ro
      - ./etl:/app/etl:ro
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        cd /app
        export PYTHONPATH=/app
        while true; do
          echo "$$(date -u -Iseconds) running etl_fx_rates"
          python etl/etl_fx_rates.py || echo "$$(date -u -Iseconds) etl_fx_rates exited $$?"
          echo "$$(date -u -Iseconds) running etl_prices_portfolio"
          python etl/etl_prices_portfolio.py || echo "$$(date -u -Iseconds) etl_prices_portfolio exited $$?"
          sleep "$${ETL_FX_INTERVAL_SEC:-86400}"
        done

volumes:
  postgres_data:
