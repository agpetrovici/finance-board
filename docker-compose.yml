services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finance}
      POSTGRES_DB: ${POSTGRES_DB:-finance}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finance} -d ${POSTGRES_DB:-finance}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    env_file:
      - path: ./.env
        required: false
    environment:
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://${POSTGRES_USER:-finance}:${POSTGRES_PASSWORD:-finance}@postgres:5432/${POSTGRES_DB:-finance}"
      FASTAPI_HOST: "0.0.0.0"
    volumes:
      # Bind-mount source code from the git clone on the host.
      # After `git pull`, run `docker compose restart web` to apply changes
      # without rebuilding the image (only rebuild if pyproject.toml changes).
      - ./main.py:/app/main.py:ro
      - ./app:/app/app:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
